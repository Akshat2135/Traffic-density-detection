<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Density Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 0.75rem;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(15, 23, 42, 0.3);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .upload-text {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        #fileInput {
            display: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1.5rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* Results Section */
        #results {
            display: none;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .result-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .result-stat:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Status colors */
        .status-low {
            color: var(--success-color);
        }

        .status-medium {
            color: var(--warning-color);
        }

        .status-high {
            color: var(--danger-color);
        }

        #previewContainer {
            margin-top: 1.5rem;
            display: none;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        #previewContainer img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            color: var(--danger-color);
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Traffic Density Analyzer</h1>
        <p class="subtitle">Upload an image of a road to check congestion levels.</p>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-hint">PNG, JPG or JPEG</div>
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/jpg">
        </div>

        <div id="previewContainer">
            <img id="imagePreview" src="" alt="Image Preview">
        </div>

        <button class="btn" id="analyzeBtn" disabled>Analyze Traffic</button>

        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <p>Analyzing traffic patterns...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div id="results">
            <div class="result-card">
                <div class="result-stat">
                    <span class="stat-label">Total Vehicles Detected</span>
                    <span class="stat-value" id="vehicleCount">0</span>
                </div>
                <div class="result-stat">
                    <span class="stat-label">Density Status</span>
                    <span class="stat-value" id="densityStatus">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const results = document.getElementById('results');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMessage = document.getElementById('errorMessage');

        // Results elements
        const vehicleCountEl = document.getElementById('vehicleCount');
        const densityStatusEl = document.getElementById('densityStatus');

        let selectedFile = null;

        // Drag and drop setup
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', function () {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];

                // Show preview
                const reader = new FileReader();
                reader.onload = function (e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';
                    dropZone.style.display = 'none'; // hide dropzone to save space
                }
                reader.readAsDataURL(selectedFile);

                analyzeBtn.disabled = false;

                // Reset states
                results.style.display = 'none';
                errorMessage.style.display = 'none';
            }
        }

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI State updates
            analyzeBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            results.style.display = 'none';
            errorMessage.style.display = 'none';

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const response = await fetch('/detect/density/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.status === 'error') {
                        throw new Error(data.message);
                    }

                    // Display results
                    vehicleCountEl.textContent = data.vehicle_count;
                    densityStatusEl.textContent = data.density_level;

                    // Apply color based on status
                    densityStatusEl.className = 'stat-value'; // reset
                    const statusLower = data.density_level.toLowerCase();
                    if (statusLower.includes('low')) densityStatusEl.classList.add('status-low');
                    else if (statusLower.includes('medium')) densityStatusEl.classList.add('status-medium');
                    else if (statusLower.includes('high')) densityStatusEl.classList.add('status-high');

                    results.style.display = 'block';
                } else {
                    throw new Error(data.detail || 'An error occurred during analysis');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
            } finally {
                analyzeBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        });

        // Allow resetting by clicking on the preview
        previewContainer.addEventListener('click', () => {
            previewContainer.style.display = 'none';
            dropZone.style.display = 'block';
            analyzeBtn.disabled = true;
            fileInput.value = '';
            selectedFile = null;
            results.style.display = 'none';
            errorMessage.style.display = 'none';
        });
    </script>
</body>

</html>
